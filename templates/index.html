<!DOCTYPE html>
<html>
<head>
    <title>AI Chatbot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="chat-container">

    <h1>Movie Recommendation Chatbot</h1>

    <div id="chat-box">
    <div class="bot-msg">
        👋 Hi! Welcome to the Movie Recommendation Chatbot.
        Tell me a genre like Action, Comedy, Horror, Sci-Fi, Romance, or Thriller.
    </div>
</div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="Type a message">
        <button onclick="sendMessage()">Send</button>
    </div>

</div>

<script>

async function sendMessage() {

    let input = document.getElementById("user-input");

    let message = input.value;

    if(message.trim() === "") return;

    let chatBox = document.getElementById("chat-box");

    chatBox.innerHTML +=
        `<div class="user-msg"><b>You:</b> ${message}</div>`;

    let response = await fetch("/chat", {

        method: "POST",

        headers: {
            "Content-Type": "application/json"
        },

        body: JSON.stringify({
            message: message
        })
    });

    let data = await response.json();

    chatBox.innerHTML +=
        `<div class="bot-msg"><b>Bot:</b> ${data.response}</div>`;

    input.value = "";

    chatBox.scrollTop = chatBox.scrollHeight;
    document
}
document.getElementById("user-input")
.addEventListener("keydown", function(event) {

    if(event.key === "Enter") {
        event.preventDefault();
        sendMessage();
    }

});

</script>

</body>
</html>
